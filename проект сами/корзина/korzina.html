<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportPit Catalog</title>
    <link rel="stylesheet" href="korzina.css">
</head>
<body>

    <!-- Верхняя шапка -->
    <header class="main-header">
        <div class="logo"><img src="logo.png" alt="A"></div>
        <button class="icon-btn cart-btn">
            <img src="bin.png" alt="Корзина" class="bin">
            <span id="cart-count">0</span>
        </button>
    </header>

    <!-- Оранжевая под-шапка -->
    <div class="sub-header">
        <a href="http://127.0.0.1:3000/main.html?vscode-livepreview=true" class="back-arrow">←</a>
    </div>

    <!-- Контейнер с карточками (прокручиваемая зона) -->
    <main class="catalog-container">
        
        <!-- Карточка товара -->
        <div class="product-card" id="cart-wrapper" data-id="1">
            <div class="product-image">
                <img src="image.png" alt="Протеин">
            </div>
            
            <div class="product-info">
                <div class="price-row">
                    <span class="price">$45</span>
                    <span class="product-name">Название товара</span>
                </div>
                
                <div class="actions">
                    <div class="quantity-selector">
                        <button class="qty-btn minus">-</button>
                        <span class="qty-value">1</span>
                        <button class="qty-btn plus">+</button>
                    </div>
                    <button class="buy-button">КУПИТЬ</button>
                </div>
            </div>
        </div>
        <!-- Содержимое корзины -->
<!-- Итоговая сумма -->
<div class="cart-total">
    <h3 style="color: rgb(207, 219, 228);">Итого: $<span id="total-sum">0</span></h3>
    <button class='clear' onclick="clearCart()">Очистить корзину</button>
</div>


        <!-- Повтори карточки сколько нужно -->
        <!-- ... -->

    </main>

    <script src="korzina.js"></script>
</body>
</html>
